<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AurisIQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f5f0e8;
    --bg2:       #ffffff;
    --bg3:       #ede8df;
    --surface:   #e8e0d0;
    --border:    #d5cbbf;
    --gold:      #a0752a;
    --gold-dim:  #c49840;
    --gold-glow: rgba(160,117,42,0.10);
    --amber:     #c05e0a;
    --text:      #1a1208;
    --text-dim:  #6b5c42;
    --text-faint:#9e8e78;
    --green:     #1e7a4a;
    --yellow:    #8a6a00;
    --red:       #c03030;
    --mono:      'Space Mono', monospace;
    --display:   'Bebas Neue', cursive;
    --body:      'Outfit', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(160,117,42,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(160,117,42,0.06) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -20%; left: 50%;
    transform: translateX(-50%);
    width: 800px; height: 400px;
    background: radial-gradient(ellipse, rgba(160,117,42,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(245,240,232,0.96);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .logo {
    display: flex; align-items: center; gap: 10px; text-decoration: none;
  }
  .logo-icon { width: 32px; height: 32px; }
  .logo-text {
    font-family: var(--display);
    font-size: 24px; letter-spacing: 2px; color: var(--gold);
  }
  .logo-sub {
    font-family: var(--mono);
    font-size: 10px; color: var(--text-faint);
    letter-spacing: 1px; text-transform: uppercase;
  }

  .header-right {
    display: flex; align-items: center; gap: 20px;
  }

  .usage-badge {
    font-family: var(--mono);
    font-size: 11px; color: var(--text-dim);
    background: var(--bg3); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 4px;
  }
  .usage-badge span { color: var(--gold); font-weight: 700; }

  .nav-tabs { display: flex; gap: 4px; }

  .nav-tab {
    font-family: var(--mono);
    font-size: 11px; letter-spacing: 0.5px;
    padding: 6px 14px; border-radius: 4px;
    border: 1px solid transparent;
    background: none; color: var(--text-dim);
    cursor: pointer; transition: all 0.2s;
    text-transform: uppercase;
  }
  .nav-tab:hover { color: var(--text); border-color: var(--border); background: var(--bg3); }
  .nav-tab.active {
    background: var(--gold-glow);
    border-color: var(--gold-dim);
    color: var(--gold);
  }

  /* MAIN */
  main {
    position: relative; z-index: 1;
    max-width: 1100px; margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* =====================
     PANTALLA 1 — ANÁLISIS
  ===================== */
  .analysis-grid {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 24px; align-items: start;
  }
  @media (max-width: 900px) { .analysis-grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }

  .panel-header {
    background: var(--bg3); border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .panel-title {
    font-family: var(--mono);
    font-size: 11px; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text-dim);
  }

  .panel-badge {
    font-family: var(--mono); font-size: 10px;
    background: var(--gold-glow); border: 1px solid var(--gold-dim);
    color: var(--gold); padding: 2px 8px; border-radius: 3px;
  }

  .panel-body { padding: 20px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }

  label {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim);
  }

  input, select, textarea {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); font-family: var(--body);
    font-size: 14px; padding: 10px 12px;
    border-radius: 6px; outline: none; transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--gold-dim); }
  select option { background: var(--bg3); }

  textarea {
    resize: vertical; min-height: 200px;
    line-height: 1.6; font-size: 13px;
  }

  .char-count {
    font-family: var(--mono); font-size: 10px;
    color: var(--text-faint); text-align: right; margin-top: 4px;
  }

  .btn-analyze {
    width: 100%; padding: 16px;
    background: var(--gold); color: #fff;
    border: none; border-radius: 6px;
    font-family: var(--display); font-size: 20px;
    letter-spacing: 2px; cursor: pointer;
    transition: all 0.2s; margin-top: 16px;
    position: relative; overflow: hidden;
  }
  .btn-analyze:hover {
    background: var(--gold-dim);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(160,117,42,0.3);
  }
  .btn-analyze:disabled {
    background: var(--surface); color: var(--text-faint);
    cursor: not-allowed; transform: none; box-shadow: none;
  }
  .btn-analyze .btn-loading { display: none; align-items: center; justify-content: center; gap: 8px; }
  .btn-analyze.loading .btn-text { display: none; }
  .btn-analyze.loading .btn-loading { display: flex; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* HISTORIAL PANEL */
  .history-list { display: flex; flex-direction: column; gap: 8px; }

  .history-item {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 14px;
    cursor: pointer; transition: all 0.2s;
  }
  .history-item:hover { border-color: var(--gold-dim); background: var(--surface); }

  .hi-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .hi-name { font-family: var(--mono); font-size: 12px; color: var(--text); font-weight: 700; }
  .hi-score { font-family: var(--display); font-size: 18px; letter-spacing: 1px; }
  .hi-meta { font-family: var(--mono); font-size: 10px; color: var(--text-faint); }

  .score-alto     { color: var(--green); }
  .score-funcional{ color: var(--yellow); }
  .score-problemas{ color: var(--amber); }
  .score-critico  { color: var(--red); }

  .empty-history {
    text-align: center; padding: 30px 20px;
    color: var(--text-faint); font-family: var(--mono); font-size: 11px;
  }

  /* RESULTADO */
  #resultado-section {
    margin-top: 32px; display: none;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .result-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px; padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .result-score-block { display: flex; align-items: center; gap: 16px; }
  .score-ring-wrap { position: relative; width: 90px; height: 90px; }
  .score-ring-wrap svg { transform: rotate(-90deg); }
  .score-ring-bg { fill: none; stroke: var(--surface); stroke-width: 7; }
  .score-ring-fill { fill: none; stroke-width: 7; stroke-linecap: round; transition: stroke-dasharray 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
  .score-number { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .score-num { font-family: var(--display); font-size: 28px; line-height: 1; }
  .score-max { font-family: var(--mono); font-size: 9px; color: var(--text-faint); }

  .result-meta h2 { font-family: var(--display); font-size: 22px; letter-spacing: 1px; color: var(--text); margin-bottom: 4px; }
  .result-meta .classification {
    display: inline-block; font-family: var(--mono); font-size: 11px;
    padding: 3px 10px; border-radius: 3px; border: 1px solid; margin-bottom: 6px;
  }
  .result-meta .vendedor-info { font-size: 13px; color: var(--text-dim); }

  .btn-nueva {
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 8px 16px; background: none;
    border: 1px solid var(--border); color: var(--text-dim);
    border-radius: 6px; cursor: pointer; transition: all 0.2s;
  }
  .btn-nueva:hover { border-color: var(--gold-dim); color: var(--gold); }

  .result-blocks { display: flex; flex-direction: column; gap: 16px; }

  .result-block { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }

  .rb-header {
    background: var(--bg3); border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none;
  }
  .rb-title {
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--gold); display: flex; align-items: center; gap: 8px;
  }
  .rb-icon { font-size: 14px; }
  .rb-chevron { color: var(--text-faint); transition: transform 0.2s; }
  .rb-header.open .rb-chevron { transform: rotate(180deg); }
  .rb-body { padding: 20px; display: none; }
  .rb-body.open { display: block; }
  .rb-text { font-size: 14px; line-height: 1.8; color: var(--text); white-space: pre-wrap; }

  .fases-grid { display: flex; flex-direction: column; gap: 12px; }
  .fase-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; }
  .fase-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .fase-name { font-family: var(--mono); font-size: 11px; letter-spacing: 0.5px; color: var(--text); }
  .fase-score { font-family: var(--display); font-size: 16px; letter-spacing: 1px; }
  .fase-bar-wrap { height: 4px; background: var(--surface); border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
  .fase-bar-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }
  .fase-text { font-size: 13px; line-height: 1.6; color: var(--text-dim); }

  .objecion-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; margin-bottom: 10px; }
  .obj-header { margin-bottom: 8px; }
  .obj-label { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-faint); margin-bottom: 3px; }
  .obj-text { font-size: 13px; color: var(--text); font-style: italic; }
  .obj-eval { display: inline-block; font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 3px; border: 1px solid; margin: 6px 0; }
  .eval-ok    { color: var(--green);  border-color: var(--green);  background: rgba(30,122,74,0.1); }
  .eval-mejora{ color: var(--yellow); border-color: var(--yellow); background: rgba(138,106,0,0.1); }
  .eval-no    { color: var(--red);    border-color: var(--red);    background: rgba(192,48,48,0.1); }
  .obj-recomendacion {
    background: var(--gold-glow); border-left: 2px solid var(--gold-dim);
    padding: 8px 12px; font-size: 13px; color: var(--text-dim);
    line-height: 1.6; margin-top: 8px; border-radius: 0 4px 4px 0;
  }

  .paso-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .paso-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; }
  .paso-label { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-faint); margin-bottom: 6px; }
  .paso-value { font-size: 13px; color: var(--text); line-height: 1.6; }

  .whatsapp-box { background: rgba(37,99,235,0.05); border: 1px solid rgba(37,99,235,0.2); border-radius: 6px; padding: 14px 16px; margin-top: 12px; }
  .whatsapp-box .paso-label { color: #4a7ed8; }
  .whatsapp-box .paso-value { font-family: var(--mono); font-size: 12px; color: #5a8ee8; white-space: pre-wrap; }

  .error-box { background: rgba(192,48,48,0.05); border: 1px solid rgba(192,48,48,0.2); border-radius: 6px; padding: 16px; }
  .error-box p { font-size: 14px; line-height: 1.8; color: var(--text); }

  /* =====================
     PANTALLA EQUIPO + COACHING
  ===================== */
  .screen-locked { display: none; }
  .screen-locked.active { display: block; }

  .locked-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; padding-bottom:20px; border-bottom:1px solid var(--border); }
  .locked-title h1 { font-family:var(--display); font-size:32px; letter-spacing:3px; color:var(--text); line-height:1; }
  .locked-title p { font-size:13px; color:var(--text-dim); margin-top:6px; }
  .locked-badge { display:flex; align-items:center; gap:8px; background:var(--gold-glow); border:1px solid var(--gold-dim); border-radius:6px; padding:10px 16px; }
  .locked-badge-crown { font-size:20px; }
  .locked-badge-text { font-family:var(--mono); font-size:11px; letter-spacing:0.5px; color:var(--gold); line-height:1.5; }
  .locked-badge-text span { display:block; font-size:10px; color:var(--gold-dim); letter-spacing:0; font-weight:400; }

  .preview-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:28px; }
  @media (max-width:700px) { .preview-grid { grid-template-columns:1fr; } }
  .preview-card { background:var(--bg2); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
  .preview-card-full { grid-column:1/-1; }

  .unlock-cta { display:flex; align-items:center; justify-content:space-between; background:var(--bg3); border:1px solid var(--gold-dim); border-radius:8px; padding:20px 24px; margin-top:8px; }
  .unlock-text h3 { font-family:var(--display); font-size:18px; letter-spacing:2px; color:var(--gold); margin-bottom:4px; }
  .unlock-text p { font-size:13px; color:var(--text-dim); max-width:400px; line-height:1.5; }
  .btn-unlock { font-family:var(--mono); font-size:11px; letter-spacing:1px; text-transform:uppercase; padding:10px 20px; background:var(--gold-glow); border:1px solid var(--gold-dim); color:var(--gold); border-radius:6px; cursor:pointer; transition:all 0.2s; white-space:nowrap; flex-shrink:0; margin-left:20px; }
  .btn-unlock:hover { background:rgba(160,117,42,0.2); border-color:var(--gold); }

  /* SALES METRICS */
  .sales-metrics { background:var(--bg2); border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:16px; }
  .sm-header { background:var(--bg3); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; }
  .sm-title { font-family:var(--mono); font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold); display:flex; align-items:center; gap:6px; }
  .sm-body { padding:16px 20px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  @media (max-width:700px) { .sm-body { grid-template-columns:1fr; } }
  .sm-card { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:14px; }
  .sm-card-label { font-family:var(--mono); font-size:10px; letter-spacing:0.8px; text-transform:uppercase; color:var(--text-faint); margin-bottom:8px; }
  .sm-card-value { font-family:var(--display); font-size:26px; letter-spacing:1px; line-height:1; margin-bottom:6px; }
  .sm-card-detail { font-size:12px; color:var(--text-dim); line-height:1.5; }
  .sm-prob-high { color:var(--green); } .sm-prob-mid { color:var(--yellow); } .sm-prob-low { color:var(--amber); } .sm-prob-none { color:var(--red); }
  .sm-signals { grid-column:1/-1; background:var(--bg3); border:1px solid rgba(192,48,48,0.2); border-radius:6px; padding:14px; }
  .sm-signals-label { font-family:var(--mono); font-size:10px; letter-spacing:0.8px; text-transform:uppercase; color:var(--red); opacity:0.8; margin-bottom:8px; display:flex; align-items:center; gap:4px; }
  .sm-signal-chips { display:flex; flex-wrap:wrap; gap:6px; }
  .sm-chip { font-family:var(--mono); font-size:11px; padding:4px 10px; border-radius:3px; border:1px solid rgba(192,48,48,0.3); color:#c05050; background:rgba(192,48,48,0.06); font-style:italic; }
  .sm-chip-none { color:var(--green); border-color:rgba(30,122,74,0.3); background:rgba(30,122,74,0.06); font-style:normal; }

  /* CONFIG */
  .config-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  @media (max-width:700px) { .config-grid { grid-template-columns:1fr; } }
  .config-section-title { font-family:var(--display); font-size:18px; letter-spacing:2px; color:var(--gold); margin-bottom:4px; }
  .config-section-desc { font-size:13px; color:var(--text-dim); margin-bottom:16px; }
  .workspace-info { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:16px; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; }
  .wi-label { font-family:var(--mono); font-size:10px; color:var(--text-faint); margin-bottom:4px; }
  .wi-value { font-size:14px; color:var(--text); }
  .plan-badge { font-family:var(--display); font-size:14px; letter-spacing:1px; padding:4px 12px; border-radius:4px; background:var(--gold-glow); border:1px solid var(--gold-dim); color:var(--gold); }
  .vendedores-list { display:flex; flex-direction:column; gap:8px; }
  .vendedor-row { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:10px 14px; display:flex; align-items:center; justify-content:space-between; }
  .vr-name { font-size:14px; color:var(--text); }
  .vr-stats { font-family:var(--mono); font-size:10px; color:var(--text-faint); }
  .vr-avg { font-family:var(--display); font-size:16px; }
  .btn-add-vendedor { width:100%; margin-top:8px; padding:10px; background:none; border:1px dashed var(--border); color:var(--text-dim); border-radius:6px; cursor:pointer; font-family:var(--mono); font-size:11px; letter-spacing:1px; transition:all 0.2s; text-transform:uppercase; }
  .btn-add-vendedor:hover { border-color:var(--gold-dim); color:var(--gold); }
  .integration-item { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:14px 16px; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }
  .int-info { display:flex; align-items:center; gap:10px; }
  .int-icon { width:32px; height:32px; background:var(--surface); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:16px; }
  .int-name { font-size:13px; color:var(--text); font-weight:500; }
  .int-status { font-family:var(--mono); font-size:10px; color:var(--text-faint); }
  .int-badge { font-family:var(--mono); font-size:10px; padding:3px 8px; border-radius:3px; border:1px solid; }
  .int-pending { color:var(--yellow); border-color:var(--yellow); background:rgba(138,106,0,0.08); }
  .int-connected { color:var(--green); border-color:var(--green); background:rgba(30,122,74,0.08); }

  /* PAGE TITLE */
  .page-title { margin-bottom: 28px; }
  .page-title h1 { font-family:var(--display); font-size:32px; letter-spacing:3px; color:var(--text); line-height:1; }
  .page-title p { font-size:13px; color:var(--text-dim); margin-top:6px; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--bg2); border: 1px solid var(--gold-dim);
    color: var(--gold); font-family: var(--mono); font-size: 12px;
    padding: 10px 16px; border-radius: 6px; z-index: 1000;
    transform: translateY(20px); opacity: 0;
    transition: all 0.3s; pointer-events: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }
  #toast.show { transform: translateY(0); opacity: 1; }

  /* LOADING OVERLAY */
  #loading-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(245,240,232,0.9); z-index: 300;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }
  #loading-overlay.open { display: flex; }
  .loading-icon { width: 60px; height: 60px; }
  .loading-label {
    font-family: var(--mono); font-size: 12px;
    letter-spacing: 2px; color: var(--gold);
    text-transform: uppercase;

  }
  @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  .loading-sub { font-family: var(--mono); font-size: 10px; color: var(--text-faint); letter-spacing: 1px; }

  /* NAV TAB PREMIUM */
  .nav-tab-premium { color: var(--text-faint) !important; opacity: 0.7; }

  /* ── PANTALLA SELECCIÓN CLIENTES ─────────────────────────── */

    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-top: 8px;
  }
  .cliente-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 24px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .cliente-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--gold);
    opacity: 0;
    transition: opacity .2s;
  }
  .cliente-card:hover { border-color: var(--gold-dim); transform: translateY(-2px); box-shadow: 0 6px 24px rgba(160,117,42,.12); }
  .cliente-card:hover::before { opacity: 1; }
  .cliente-card-icon { font-size: 32px; margin-bottom: 14px; }
  .cliente-card-nombre { font-family: var(--display); font-size: 22px; letter-spacing: 2px; color: var(--text); margin-bottom: 4px; }
  .cliente-card-desc { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; line-height: 1.5; }
  .cliente-card-meta { display: flex; flex-wrap: wrap; gap: 6px; }
  .cliente-meta-chip {
    font-family: var(--mono); font-size: 9px; letter-spacing: .5px;
    padding: 3px 8px; border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--bg3); color: var(--text-faint);
    text-transform: uppercase;
  }
  .cliente-meta-chip.active { border-color: rgba(160,117,42,.4); color: var(--gold); background: var(--gold-glow); }
  .cliente-card-arrow {
    position: absolute; top: 50%; right: 20px;
    transform: translateY(-50%);
    font-size: 20px; color: var(--border);
    transition: all .2s;
  }
  .cliente-card:hover .cliente-card-arrow { color: var(--gold); transform: translateY(-50%) translateX(3px); }

  /* Sub-selector de tipo (cuando cliente tiene múltiples) */
  .subtipo-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(245,240,232,.92);
    backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .subtipo-overlay.show { opacity: 1; pointer-events: all; }
  .subtipo-modal {
    background: var(--bg2);
    border: 1px solid var(--border);

    padding: 36px;
    width: 100%; max-width: 560px;

    display: flex; align-items: center; gap: 16px;

  .subtipo-close {

<script>
// ── Clientes AurisIQ — standalone, sin módulos ES6 ──────────
const CLIENTES = [
  {
    id: 'enpagos',
    nombre: 'EnPagos',
    descripcion: 'Crédito PyME · Ventas por teléfono',
    icono: '◆',
    chips: ['Scorecard v1', 'Financiero'],
    empresa: 'EnPagos',
    producto: 'Crédito PyME',
    scorecard: 'v1',
    url: 'aurisiq.html?cliente=enpagos'
  },
  {
    id: 'immobili',
    nombre: 'Immobili Internacional',
    descripcion: 'Captación inmobiliaria · Infonavit',
    icono: '⬡',
    chips: ['Scorecard v5A', 'Scorecard v5B', 'Inmobiliario'],
    empresa: 'Immobili Internacional',
    scorecard: 'v5',
    subtipo: true
  }
];

window.clienteActivo = null;
window.subtipoActivo = null;

function renderClientes() {
  const grid = document.getElementById('clientes-grid');
  if (!grid) { setTimeout(renderClientes, 50); return; }
  grid.innerHTML = CLIENTES.map(c => `
    <div class="cliente-card" onclick="seleccionarCliente('${c.id}')">
      <div class="cliente-icon">${c.icono}</div>
      <div class="cliente-nombre">${c.nombre}</div>
      <div class="cliente-desc">${c.descripcion}</div>
      <div class="cliente-chips">
        ${c.chips.map(ch => `<span class="cliente-meta-chip active">${ch}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

window.seleccionarCliente = function(id) {
  const cliente = CLIENTES.find(c => c.id === id);
  if (!cliente) return;
  window.clienteActivo = cliente;
  if (cliente.subtipo) {
    const modal = document.getElementById('modal-subtipo');
    modal.style.display = 'flex';
  } else {
    window.location.href = cliente.url;
  }
};

window.confirmarSubtipo = function(tipo) {
  cerrarModal();
  window.location.href = 'aurisiq.html?cliente=immobili&tipo=' + tipo;
};

window.cerrarModal = function() {
  document.getElementById('modal-subtipo').style.display = 'none';
};

// Actualizar contador de análisis
(function() {
  try {
    const h = JSON.parse(localStorage.getItem('aurisiq_historial') || '[]');
    const el = document.getElementById('uso-count');
    if (el) el.textContent = h.length;
  } catch(e) {}
})();

// Render
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', renderClientes);
} else {
  renderClientes();
}
</script>
